version: '3.8'

services:
  minio:
    image: minio/minio:latest
    container_name: minio-sports
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - sports-network

  db:
    image: postgres:15-alpine
    container_name: kinetic-db
    environment:
      POSTGRES_USER: kinetic_user
      POSTGRES_PASSWORD: kinetic_pass
      POSTGRES_DB: kinetic_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - sports-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kinetic_user -d kinetic_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: kinetic-adminer
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db
    depends_on:
      - db
    networks:
      - sports-network

  app:
    build: .
    container_name: kinetic-app
    ports:
      - "8080:8080"
    depends_on:
      - minio
      - db
    networks:
      - sports-network
    volumes:
      - .:/app
    environment:
      DB_HOST: db
      DB_USER: kinetic_user
      DB_PASS: kinetic_pass
      DB_NAME: kinetic_db

volumes:
  minio_data:
  pg_data:

networks:
  sports-network:
    driver: bridge
